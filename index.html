<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

 
  <div class="sidebar">
    <h2>Dashboard</h2>
    <ul>
      <li class="active">🏠 Home</li>
      <li>📚 Courses</li>
      <li>📊 Progress</li>
      <li>📝 Assignments</li>
      <li>📅 Schedule</li>
      <li>📢 Announcements</li>
      <li>⚙️ Settings</li>
    </ul>
  </div>

 
  <div class="main">

    
    <div class="profile">
      <img src="../Profile_card/Image.jpeg" alt="profile">
      <div>
        <h2>Harshit Pradhan</h2>
        <p>BCA - Semester 6</p>
      </div>
    </div>

    
    <div class="courses">
      <h3>Enrolled Courses</h3>

      <div class="course-box">
        <div class="card">☕ Java Programming</div>
        <div class="card">🟢 Data Structures</div>
        <div class="card">🌐 Web Development</div>
      </div>
    </div>

    
    <div class="progress-section">
      <h3>Progress</h3>

      <p>Java</p>
      <div class="bar"><div class="fill java"></div></div>

      <p>DSA</p>
      <div class="bar"><div class="fill dsa"></div></div>

      <p>Web Dev</p>
      <div class="bar"><div class="fill web"></div></div>

    </div>

  </div>

</div>

</body>
</html>
